<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Factory Direct Luxury Bags</title>

<style>

body{
font-family:Arial;
margin:0;
background:#0d0d0d;
color:white;
text-align:center;
}

.container{
max-width:900px;
margin:auto;
padding:25px;
}

h1{
color:#FFD700;
}

button{
background:linear-gradient(135deg,#FFD700,#FFA500);
border:none;
padding:15px 25px;
font-size:18px;
border-radius:10px;
cursor:pointer;
margin-top:15px;
}

button:hover{
transform:scale(1.05);
}

.gallery{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-top:25px;
}

.gallery img{
width:100%;
border-radius:10px;
cursor:pointer;
}

.timer{
margin-top:15px;
color:#FFD700;
font-size:18px;
font-weight:bold;
}

.online{
color:#FFD700;
font-weight:bold;
margin-bottom:10px;
}

.order-alert{
position:fixed;
bottom:90px;
right:20px;
background:black;
color:#FFD700;
padding:12px 18px;
border-radius:10px;
opacity:0;
transition:0.5s;
}

#waFloat{
position:fixed;
bottom:20px;
right:20px;
width:60px;
height:60px;
border-radius:50%;
background:#25D366;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

#waFloat img{
width:35px;
}

</style>
</head>


<body>

<div class="container">

<div class="online" id="online">Online Users: 0</div>

<h1>Factory Direct Luxury Bags</h1>

<p>15 Years Experience Factory</p>

<div class="timer">
🔥 Discount Ends In <span id="timer">15:00</span>
</div>

<button onclick="goWA()">Contact on WhatsApp</button>


<div class="gallery" id="gallery"></div>


<h2>Shipping</h2>

<p>DHL / FedEx / UPS</p>

<h2>Payment</h2>

<p>PayPal / Bank Transfer</p>

<button onclick="goWA()">Order Now</button>

</div>


<div id="waFloat" onclick="goWA()">
<img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg">
</div>

<div class="order-alert" id="orderAlert"></div>


<script>

/* ===== Pixel ===== */

!function(f,b,e,v,n,t,s){
if(f.fbq)return;
n=f.fbq=function(){
n.callMethod?n.callMethod.apply(n,arguments):n.queue.push(arguments)
};
if(!f._fbq)f._fbq=n;
n.push=n;
n.loaded=!0;
n.version='2.0';
n.queue=[];
t=b.createElement(e);
t.async=!0;
t.src=v;
s=b.getElementsByTagName(e)[0];
s.parentNode.insertBefore(t,s)
}(window,document,'script','https://connect.facebook.net/en_US/fbevents.js');


const PIXEL="853640044397925";

fbq('init',PIXEL,{external_id:Date.now()});
fbq('track','PageView');


setTimeout(()=>{
fbq('trackCustom','PageEngaged');
},5000);


/* ===== WhatsApp Pool ===== */

const WA_POOL=[
"https://api.whatsapp.com/send?phone=8618396503253&text=Hello%20I%20want%20to%20order",
"https://api.whatsapp.com/send?phone=8613062151120&text=Hello%20I%20want%20to%20order",
"https://api.whatsapp.com/send?phone=8615205956592&text=Hello%20I%20want%20to%20order"
];


function goWA(){

const id='evt_'+Date.now();

fbq('track','Lead',{contact:'whatsapp'},{eventID:id});
fbq('track','Contact',{contact:'whatsapp'},{eventID:id});

let link=WA_POOL[Math.floor(Math.random()*WA_POOL.length)];

setTimeout(()=>{
window.location.href=link;
},1200);

}


/* ===== Scroll Event ===== */

window.addEventListener('scroll',function(){

if(window.scrollY>400){

fbq('trackCustom','ScrollView');

}

});


/* ===== Products ===== */

const products=[
"https://us.louisvuitton.com/images/is/image/lv/1/PP_VP_L/louis-vuitton-neverfull-mm--M46975_PM2_Front%20view.jpg",
"https://us.louisvuitton.com/images/is/image/lv/1/PP_VP_L/louis-vuitton-again--M25877_PM2_Front%20view.jpg"
];

const gallery=document.getElementById("gallery");

products.forEach((p,i)=>{

let img=document.createElement("img");

img.src=p;

img.onclick=()=>{

fbq('track','ViewContent',{
content_name:'LV Bag',
content_ids:['bag_'+i],
content_type:'product'
});

goWA();

};

gallery.appendChild(img);

});


/* ===== Online Counter ===== */

function online(){

let n=Math.floor(Math.random()*40+60);

document.getElementById("online").innerText="Online Users: "+n;

}

setInterval(online,5000);

online();


/* ===== Countdown ===== */

let time=900;

setInterval(()=>{

time--;

let m=Math.floor(time/60);
let s=time%60;

document.getElementById("timer").innerText=
m+":"+("0"+s).slice(-2);

},1000);


/* ===== Fake Orders ===== */

const orders=[
"Alice from USA purchased a bag",
"Emma from UK ordered a handbag",
"Lucas from Canada bought a watch",
"Olivia from Australia placed an order"
];

function showOrder(){

let alert=document.getElementById("orderAlert");

alert.innerText="🎉 "+orders[Math.floor(Math.random()*orders.length)];

alert.style.opacity=1;

setTimeout(()=>{
alert.style.opacity=0;
},4000);

}

setInterval(showOrder,7000);


</script>


</body>
</html>
