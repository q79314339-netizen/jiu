<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxury Bags & Watches</title>

<!-- Facebook Pixel -->
<script>
!function(f,b,e,v,n,t,s)
{if(f.fbq)return;n=f.fbq=function(){n.callMethod?
n.callMethod.apply(n,arguments):n.queue.push(arguments)};
if(!f._fbq)f._fbq=n;
n.push=n;n.loaded=!0;n.version='2.0';
n.queue=[];
t=b.createElement(e);t.async=!0;
t.src=v;
s=b.getElementsByTagName(e)[0];
s.parentNode.insertBefore(t,s)
}(window, document,'script','https://connect.facebook.net/en_US/fbevents.js');
fbq('init', '853640044397925');
fbq('track', 'PageView');
</script>

<style>
body{font-family:Arial,sans-serif;margin:0;background:#fff;color:#222;}
.container{max-width:1200px;margin:auto;padding:20px;}
h1,h2{color:#d4af37;}
button{cursor:pointer;transition:0.3s;}
.hero{height:420px;background:url("https://images.unsplash.com/photo-1548036328-c9fa89d128fa") center/cover no-repeat;display:flex;align-items:center;justify-content:center;flex-direction:column;color:white;text-align:center;}
.hero h1{font-size:48px;text-shadow:2px 2px 8px rgba(0,0,0,0.5);}
.hero button{margin-top:20px;background:#25D366;border:none;padding:14px 28px;border-radius:10px;color:white;font-size:16px;}
.online{margin-top:8px;font-size:14px;text-shadow:1px 1px 3px rgba(0,0,0,0.5);}
.products{margin-top:40px;}
.product-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:30px;}
.product{border-radius:12px;overflow:hidden;box-shadow:0 4px 10px rgba(0,0,0,0.1);}
.product img{width:100%;height:300px;object-fit:cover;}
.product-info{padding:15px;text-align:center;}
.product button{background:#d4af37;border:none;padding:10px 20px;border-radius:20px;}
#floatWA{position:fixed;right:20px;bottom:20px;width:60px;height:60px;background:#25D366;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:999;}
#floatWA img{width:32px;}
@media(max-width:1024px){.product-grid{grid-template-columns:1fr 1fr;}}
@media(max-width:768px){.product-grid{grid-template-columns:1fr;}}
</style>
</head>

<body>

<div class="hero">
<h1>Luxury Bags & Watches</h1>
<p>Premium Quality | Worldwide Shipping</p>
<button onclick="goWA()">Contact WhatsApp</button>
<div class="online" id="onlineCount"></div>
</div>

<div class="container">
<section class="products">
<h2>Popular Products</h2>
<div class="product-grid">
<div class="product">
<img src="https://images.unsplash.com/photo-1591561954557-26941169b49e">
<div class="product-info"><h3>Luxury Tote Bag</h3><button onclick="productClick('Tote Bag')">WhatsApp Inquiry</button></div>
</div>
<div class="product">
<img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30">
<div class="product-info"><h3>Luxury Watch</h3><button onclick="productClick('Watch')">WhatsApp Inquiry</button></div>
</div>
<div class="product">
<img src="https://images.unsplash.com/photo-1584917865442-de89df76afd3">
<div class="product-info"><h3>Designer Handbag</h3><button onclick="productClick('Handbag')">WhatsApp Inquiry</button></div>
</div>
</div>
</section>
</div>

<div id="floatWA" onclick="goWA()"><img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg"></div>

<script>
// WhatsApp 客服池
const WA_POOL=[
{name:"Sales1",link:"https://wa.me/8619500182858"},
{name:"Sales2",link:"https://wa.me/8619748156826"},
{name:"Sales3",link:"https://wa.me/8613489920964"}
];

// Cookie 存储分配
function getCookie(name){let m=document.cookie.match('(^|;) ?'+name+'=([^;]*)(;|$)');return m?m[2]:null;}
function setCookie(name,value,days){let d=new Date();d.setTime(d.getTime()+24*60*60*1000*days);document.cookie=name+"="+value+";path=/;expires="+d.toGMTString();}

// 随机分配客服
let idx=getCookie("wa_idx");
if(idx==null){idx=Math.floor(Math.random()*WA_POOL.length);setCookie("wa_idx",idx,365);}

// 强制跳转 WhatsApp
function goWA(){
  let wa=WA_POOL[idx];
  fbq('track','Lead'); 
  let msg=encodeURIComponent("Hello, I'm interested in your products");
  let url = wa.link + "?text=" + msg;
  window.location.href = url; // 当前页面强制跳转
}

// 产品按钮点击
function productClick(name){
  fbq('track','ViewContent',{content_name:name});
  goWA();
}

// 模拟在线人数
let n=Math.floor(Math.random()*20)+15;
document.getElementById("onlineCount").innerText="🔥 "+n+" people are chatting on WhatsApp now";
</script>

</body>
</html>
